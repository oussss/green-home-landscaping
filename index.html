<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Green Home Landscaping - Luxury Outdoor Spaces in Dubai</title>
    <meta name="description" content="Award-winning luxury landscape design creating stunning outdoor spaces in Dubai. Professional landscaping services with premium design and craftsmanship." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Schema markup for local business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Green Home Landscaping",
      "description": "Award-winning luxury landscape design in Dubai",
      "url": "https://greenhomelandscaping.ae",
      "telephone": "+971-4-GARDEN-1",
      "priceRange": "$$$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressRegion": "Dubai",
        "addressCountry": "AE"
      },
      "serviceArea": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": "25.2048",
          "longitude": "55.2708"
        },
        "geoRadius": "100000"
      }
    }
    </script>
    
    <style>
      /* Ensure full width on all devices */
      html, body {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
      }
      
      /* Mobile viewport fix */
      @media screen and (max-width: 768px) {
        html {
          width: 100vw;
          overflow-x: hidden;
        }
        
        body {
          width: 100vw;
          overflow-x: hidden;
          position: relative;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
